version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./BE
    container_name: practicum-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    env_file:
      - ./BE/.env
    volumes:
      - ./BE/.env:/app/.env
      - ./BE/src:/app/src
    restart: always

  frontend:
    build: ./FE
    container_name: practicum-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
